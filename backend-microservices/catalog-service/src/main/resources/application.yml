server:
  port: 8082

spring:
  application:
    name: catalog-service
  datasource:
    url: jdbc:h2:mem:catalogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  security:
    supabase:
      jwt-secret: "your-supabase-jwt-secret-placeholder-minimum-32-characters"
      jwt-issuer: ""
      jwt-audience: "authenticated"
